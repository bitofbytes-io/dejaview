name: CI build → push → trigger deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-trigger:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04-arm
    environment:
      name: crystal1
    env:
      IMAGE_REG: ${{ vars.IMAGE_REG }}
      IMAGE_REPO: ${{ vars.IMAGE_REPO }}
      MANAGER_HOST: ${{ vars.MANAGER_HOST }}
      MANAGER_REPO_PATH: ${{ vars.MANAGER_REPO_PATH }}
      PLATFORMS: linux/arm64/v8
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive TAG
        id: meta
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        run: templ generate

      - name: Install Tailwind CLI binary
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-arm64
          chmod +x tailwindcss-linux-arm64
          sudo mv tailwindcss-linux-arm64 /usr/local/bin/tailwindcss
          tailwindcss --version

      - name: Build Tailwind CSS
        run: make tail-prod

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ vars.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ env.MANAGER_HOST }}

      - name: Verify registry Tailscale route
        run: |
          set -euo pipefail
          registry_endpoint="${IMAGE_REG%%/*}"
          registry_host="${registry_endpoint%%:*}"
          registry_ip="$(getent ahostsv4 "${registry_host}" | awk '{print $1; exit}')"
          if [[ -z "${registry_host}" || -z "${registry_ip}" ]]; then
            echo "Unable to resolve registry host over Tailscale" >&2
            exit 1
          fi
          if [[ ! "${registry_ip}" =~ ^100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Resolved registry IP ${registry_ip} is not in the Tailscale CGNAT range" >&2
            exit 1
          fi
          status="$(curl -sS -o /dev/null -w '%{http_code}' "https://${registry_endpoint}/v2/")"
          if [[ "${status}" != "200" && "${status}" != "401" ]]; then
            echo "Registry returned unexpected HTTP status ${status}" >&2
            exit 1
          fi
          echo "Registry ${registry_endpoint} resolved to ${registry_ip} and returned HTTP ${status}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REG }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push dejaview image
        env:
          REGISTRY: ${{ env.IMAGE_REG }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          PLATFORMS: ${{ env.PLATFORMS }}
          TAG: ${{ steps.meta.outputs.TAG }}
          VERSION: ${{ steps.meta.outputs.TAG }}
          REVISION: ${{ github.sha }}
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          : "${REGISTRY:?Missing vars.IMAGE_REG}"
          : "${IMAGE_REPO:?Missing vars.IMAGE_REPO}"
          make docker-buildx

      - name: Install SSH key & known_hosts
        env:
          DEPLOY_KEY: ${{ secrets.LOCAL_REPO_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.LOCAL_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push main to local bare repo (trigger hook)
        run: |
          set -euo pipefail
          : "${MANAGER_HOST:?Missing vars.MANAGER_HOST}"
          : "${MANAGER_REPO_PATH:=/srv/git/dejaview-ci.git}"
          git remote add local "ssh://git@${MANAGER_HOST}/${MANAGER_REPO_PATH}"
          git push --force local HEAD:refs/heads/main
